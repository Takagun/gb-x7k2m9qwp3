name: debug-fetch
# 一時的な診断用ワークフロー。過去日付の出馬表ページ構造を調査したら削除する。
on:
  workflow_dispatch:
    inputs:
      race_id:
        description: "調査するrace_id"
        required: false
        default: "202604020201"
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Probe pages
        run: |
          python - "${{ inputs.race_id }}" <<'EOF'
          import sys
          from engine.scraper import BaseScraper, SHUTUBA_URL

          race_id = sys.argv[1]
          s = BaseScraper()

          for label, url in [
              ("shutuba", SHUTUBA_URL.format(race_id=race_id)),
              ("result", f"https://race.netkeiba.com/race/result.html?race_id={race_id}"),
          ]:
              resp = s._fetch(url)
              if resp.encoding is None or resp.encoding.lower() in ("iso-8859-1", "windows-1252"):
                  resp.encoding = "EUC-JP"
              text = resp.text
              print(f"===== {label} =====")
              print("status:", resp.status_code, "final_url:", resp.url)
              print("len:", len(text))
              import re
              m = re.search(r"<title>(.*?)</title>", text, re.S)
              print("title:", (m.group(1).strip()[:120] if m else None))
              print("has RaceData01:", "RaceData01" in text)
              print("has 芝:", "芝" in text, "/ has ダ1 or ダ2:", bool(re.search(r"ダ\d", text)))
              print("surface_dist matches:", re.findall(r"(芝|ダ)(\d{3,4})m", text)[:5])
              print("hatsuso matches:", re.findall(r"(\d{1,2}:\d{2})発走", text)[:3])
              print("horse links:", len(re.findall(r"db\.netkeiba\.com/horse/(\d{10})", text)))
              print("Umaban class count:", text.count("Umaban"))
              i = text.find("RaceData01")
              if i >= 0:
                  snippet = re.sub(r"\s+", " ", text[i:i+900])
                  print("RaceData01 snippet:", snippet[:900])
          EOF
