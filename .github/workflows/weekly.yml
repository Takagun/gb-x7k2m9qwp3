name: weekly
on:
  schedule:
    - cron: "0 12 * * 4,5"   # 木・金 21:00 JST
  workflow_dispatch:
concurrency:
  group: data-update
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
jobs:
  build-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Build candidates.json
        run: python -m engine.build_weekly
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/candidates.json data/sire_cache.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "weekly: candidates更新 [skip ci]"
            git pull --rebase origin main
            git push
            # [skip ci] でpagesも発火しないため明示的にデプロイを起動
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
