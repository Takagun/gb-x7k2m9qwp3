name: weekly
on:
  schedule:
    - cron: "0 12 * * 4,5"   # 木・金 21:00 JST
  workflow_dispatch:
    inputs:
      dates:
        description: "対象日 YYYYMMDD (カンマ区切り可)。空なら次の土日"
        required: false
        default: ""
      probe_race_id:
        description: "(一時診断用) 指定するとページ構造を出力して終了"
        required: false
        default: ""
concurrency:
  group: data-update
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
jobs:
  build-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Probe page structure (一時診断用)
        if: inputs.probe_race_id != ''
        run: |
          python - "${{ inputs.probe_race_id }}" <<'EOF'
          import re
          import sys
          from engine.scraper import BaseScraper, SHUTUBA_URL

          race_id = sys.argv[1]
          s = BaseScraper()
          for label, url in [
              ("shutuba", SHUTUBA_URL.format(race_id=race_id)),
              ("result", f"https://race.netkeiba.com/race/result.html?race_id={race_id}"),
          ]:
              resp = s._fetch(url)
              if resp.encoding is None or resp.encoding.lower() in ("iso-8859-1", "windows-1252"):
                  resp.encoding = "EUC-JP"
              text = resp.text
              print(f"===== {label} =====")
              print("status:", resp.status_code, "final_url:", resp.url)
              print("len:", len(text))
              m = re.search(r"<title>(.*?)</title>", text, re.S)
              print("title:", (m.group(1).strip()[:120] if m else None))
              print("has RaceData01:", "RaceData01" in text)
              print("surface_dist matches:", re.findall(r"(芝|ダ)(\d{3,4})m", text)[:5])
              print("hatsuso matches:", re.findall(r"(\d{1,2}:\d{2})発走", text)[:3])
              print("horse links:", len(re.findall(r"db\.netkeiba\.com/horse/(\d{10})", text)))
              print("Umaban count:", text.count("Umaban"))
              i = text.find("RaceData01")
              if i >= 0:
                  print("RaceData01 snippet:", re.sub(r"\s+", " ", text[i:i+900])[:900])
          EOF
          exit 0
      - name: Build candidates.json
        if: inputs.probe_race_id == ''
        run: |
          if [ -n "${{ inputs.dates }}" ]; then
            python -m engine.build_weekly --date "${{ inputs.dates }}"
          else
            python -m engine.build_weekly
          fi
      - name: Commit and push
        if: inputs.probe_race_id == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/candidates.json data/sire_cache.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "weekly: candidates更新 [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
            # [skip ci] でpagesも発火しないため明示的にデプロイを起動
            gh workflow run pages.yml --ref "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
