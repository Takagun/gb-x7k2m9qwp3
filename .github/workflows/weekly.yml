name: weekly
on:
  schedule:
    - cron: "0 12 * * 4,5"   # 木・金 21:00 JST
  workflow_dispatch:
    inputs:
      dates:
        description: "対象日 YYYYMMDD (カンマ区切り可)。空なら次の土日"
        required: false
        default: ""
      probe:
        description: "非空ならページ構造の診断のみ実行 (build しない)"
        required: false
        default: ""
concurrency:
  group: data-update
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
jobs:
  build-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Probe page structure (一時診断用)
        if: ${{ inputs.probe != '' }}
        run: python .github/probe_netkeiba.py
      - name: Build candidates.json
        if: ${{ inputs.probe == '' }}
        run: |
          if [ -n "${{ inputs.dates }}" ]; then
            python -m engine.build_weekly --date "${{ inputs.dates }}"
          else
            python -m engine.build_weekly
          fi
      - name: Commit and push
        if: ${{ inputs.probe == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/candidates.json data/sire_cache.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "weekly: candidates更新 [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
            # [skip ci] でpagesも発火しないため明示的にデプロイを起動
            gh workflow run pages.yml --ref "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
