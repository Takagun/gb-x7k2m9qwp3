name: odds
on:
  schedule:
    - cron: "0 23 * * 5,6"   # 土日 8:00 JST (UTC前日)
    - cron: "0 0-7 * * 6,0"  # 土日 9:00-16:00 JST 毎時
  workflow_dispatch:
concurrency:
  group: data-update
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
jobs:
  update-odds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Update picks.json
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m engine.update_odds
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/picks.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "odds: picks更新 [skip ci]"
            git pull --rebase origin main
            git push
            # [skip ci] でpagesも発火しないため明示的にデプロイを起動
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
